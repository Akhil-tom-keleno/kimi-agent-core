            tab.addEventListener('click', () => {

                    t.classList.remove('active');
                    t.classList.add('text-gray-400');
                });
                tab.classList.add('active');
                tab.classList.remove('text-gray-400');
                
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.add('hidden');
                });
                document.getElementById(tab.dataset.tab + '-tab').classList.remove('hidden');
            });
        });

        // Load page data
        function loadPageData() {
            if (!pageName || !defaultPageData[pageName]) {
                alert('Page not found');
                window.location.href = 'pages.html';
                return;
            }

            const data = defaultPageData[pageName];
            document.getElementById('pageTitle').textContent = 'Edit ' + data.title;
            document.getElementById('pageFile').textContent = data.file;
            document.getElementById('viewPageLink').href = '../' + data.file;

            // Load saved data if exists
            const savedPages = JSON.parse(localStorage.getItem('corePages') || '{}');
            const savedData = savedPages[pageName] || {};
            const mergedData = { ...data, ...savedData };

            // Populate fields
            document.getElementById('heroLabel').value = mergedData.heroLabel || '';
            document.getElementById('heroHeadline').value = mergedData.heroHeadline || '';
            document.getElementById('heroSubtitle').value = mergedData.heroSubtitle || '';
            document.getElementById('heroCta').value = mergedData.heroCta || '';
            document.getElementById('heroImage').value = mergedData.heroImage || '';
            
            if (mergedData.heroImage) {
                document.getElementById('heroImagePreview').classList.remove('hidden');
                document.getElementById('heroImagePreview').querySelector('img').src = mergedData.heroImage;
            }

            document.getElementById('section1Title').value = mergedData.section1Title || '';
            document.getElementById('section1Content').value = mergedData.section1Content || '';
            document.getElementById('section1Image').value = mergedData.section1Image || '';

            document.getElementById('stat1Value').value = mergedData.stat1Value || '';
            document.getElementById('stat1Label').value = mergedData.stat1Label || '';
            document.getElementById('stat2Value').value = mergedData.stat2Value || '';
            document.getElementById('stat2Label').value = mergedData.stat2Label || '';
            document.getElementById('stat3Value').value = mergedData.stat3Value || '';
            document.getElementById('stat3Label').value = mergedData.stat3Label || '';

            document.getElementById('ctaLabel').value = mergedData.ctaLabel || '';
            document.getElementById('ctaHeadline').value = mergedData.ctaHeadline || '';
            document.getElementById('ctaDescription').value = mergedData.ctaDescription || '';
            document.getElementById('ctaButton').value = mergedData.ctaButton || '';
            document.getElementById('ctaImage').value = mergedData.ctaImage || '';

            document.getElementById('pageTitleInput').value = mergedData.pageTitle || '';
            document.getElementById('metaDescription').value = mergedData.metaDescription || '';
            document.getElementById('metaKeywords').value = mergedData.metaKeywords || '';
        }

        // Image preview
        document.getElementById('heroImage').addEventListener('input', function() {
            const url = this.value;
            if (url) {
                document.getElementById('heroImagePreview').classList.remove('hidden');
                document.getElementById('heroImagePreview').querySelector('img').src = url;
            } else {
                document.getElementById('heroImagePreview').classList.add('hidden');
            }
        });

        // Save page
        function savePage() {
            const savedPages = JSON.parse(localStorage.getItem('corePages') || '{}');
            savedPages[pageName] = {
                heroLabel: document.getElementById('heroLabel').value,
                heroHeadline: document.getElementById('heroHeadline').value,
                heroSubtitle: document.getElementById('heroSubtitle').value,
                heroCta: document.getElementById('heroCta').value,
                heroImage: document.getElementById('heroImage').value,
                section1Title: document.getElementById('section1Title').value,
                section1Content: document.getElementById('section1Content').value,
                section1Image: document.getElementById('section1Image').value,
                stat1Value: document.getElementById('stat1Value').value,
                stat1Label: document.getElementById('stat1Label').value,
                stat2Value: document.getElementById('stat2Value').value,
                stat2Label: document.getElementById('stat2Label').value,
                stat3Value: document.getElementById('stat3Value').value,
                stat3Label: document.getElementById('stat3Label').value,
                ctaLabel: document.getElementById('ctaLabel').value,
                ctaHeadline: document.getElementById('ctaHeadline').value,
                ctaDescription: document.getElementById('ctaDescription').value,
                ctaButton: document.getElementById('ctaButton').value,
                ctaImage: document.getElementById('ctaImage').value,
                pageTitle: document.getElementById('pageTitleInput').value,
                metaDescription: document.getElementById('metaDescription').value,
                metaKeywords: document.getElementById('metaKeywords').value,
                lastModified: new Date().toISOString()
            };
            localStorage.setItem('corePages', JSON.stringify(savedPages));
            
            // Add to activity log
            const activity = JSON.parse(localStorage.getItem('coreActivity') || '[]');
            activity.unshift({
                action: 'Updated ' + defaultPageData[pageName].title,
                date: new Date().toISOString()
            });
            localStorage.setItem('coreActivity', JSON.stringify(activity.slice(0, 10)));
            
            alert('Page saved successfully!');
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('adminEmail');
            window.location.href = 'login.html';
        }

        loadPageData();
    </script>
</body>
</html>
