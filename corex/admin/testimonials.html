<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Testimonials | CORE Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; }
        .sidebar { background: #0a0a0a; border-right: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-item { transition: all 0.3s ease; }
        .nav-item:hover, .nav-item.active { background: rgba(255, 255, 255, 0.1); }
        .card { background: #0a0a0a; border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen">
    <script>if (!localStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';</script>

    <div class="flex min-h-screen">
        <aside class="sidebar w-64 fixed h-full overflow-y-auto">
            <div class="p-6">
                <a href="../index.html" target="_blank">
                    <img src="https://kimi-web-img.moonshot.cn/img/upload/C%20(2)%20copy.png" alt="CORE" class="h-8 w-auto brightness-0 invert">
                </a>
            </div>
            <nav class="px-4 pb-6">
                <p class="text-xs text-gray-600 uppercase tracking-wider mb-3 px-4">Content</p>
                <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                    Dashboard
                </a>
                <a href="pages.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    Pages
                </a>
                <a href="blogs.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
                    Blog Posts
                </a>
                <a href="case-studies.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    Case Studies
                </a>
                <a href="testimonials.html" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    Testimonials
                </a>
                <a href="seo.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
                    SEO Settings
                </a>
                <p class="text-xs text-gray-600 uppercase tracking-wider mb-3 mt-6 px-4">Account</p>
                <button onclick="logout()" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-red-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout
                </button>
            </nav>
        </aside>

        <main class="flex-1 ml-64 p-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-white">Testimonials</h1>
                    <p class="text-gray-500 mt-1">Manage client testimonials and reviews</p>
                </div>
                <div class="flex gap-3">
                    <a href="dashboard.html" class="text-gray-400 hover:text-white transition-colors px-4 py-2">← Back</a>
                    <a href="testimonial-edit.html" class="bg-white text-black px-6 py-2 rounded-lg font-bold hover:bg-gray-200 transition-colors flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Add Testimonial
                    </a>
                </div>
            </div>

            <div id="testimonialsList" class="space-y-4"></div>

            <div id="emptyState" class="hidden card rounded-2xl p-12 text-center">
                <div class="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                </div>
                <h3 class="text-xl font-bold text-white mb-2">No testimonials yet</h3>
                <p class="text-gray-500 mb-6">Add your first client testimonial</p>
                <a href="testimonial-edit.html" class="bg-white text-black px-6 py-3 rounded-lg font-bold hover:bg-gray-200 transition-colors inline-flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    Add Testimonial
                </a>
            </div>
        </main>
    </div>

    <script>
        function loadTestimonials() {
            const testimonials = JSON.parse(localStorage.getItem('coreTestimonials') || '[]');
            const list = document.getElementById('testimonialsList');
            const emptyState = document.getElementById('emptyState');

            if (testimonials.length === 0) {
                list.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            list.classList.remove('hidden');
            emptyState.classList.add('hidden');

            list.innerHTML = testimonials.map(t => `
                <div class="card rounded-2xl p-6">
                    <div class="flex items-start justify-between">
                        <div class="flex items-start gap-4">
                            <div class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center flex-shrink-0">
                                <span class="text-white font-bold text-lg">${t.name ? t.name.charAt(0) : '?'}</span>
                            </div>
                            <div>
                                <div class="flex items-center gap-2 mb-2">
                                    ${Array(5).fill(0).map((_, i) => `
                                        <svg class="w-4 h-4 ${i < (t.rating || 5) ? 'text-white' : 'text-gray-600'}" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                    `).join('')}
                                </div>
                                <p class="text-gray-300 mb-2">"${t.content.substring(0, 150)}..."</p>
                                <p class="text-white font-medium">${t.name}</p>
                                <p class="text-gray-500 text-sm">${t.title || ''}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="flex items-center gap-2 ${t.published !== false ? 'text-green-400' : 'text-yellow-400'} text-sm">
                                <span class="w-2 h-2 ${t.published !== false ? 'bg-green-400' : 'bg-yellow-400'} rounded-full"></span>
                                ${t.published !== false ? 'Published' : 'Draft'}
                            </span>
                            <a href="testimonial-edit.html?id=${t.id}" class="bg-white/10 text-white px-4 py-2 rounded-lg hover:bg-white/20 transition-colors">Edit</a>
                            <button onclick="deleteTestimonial('${t.id}')" class="bg-red-500/10 text-red-400 px-4 py-2 rounded-lg hover:bg-red-500/20 transition-colors">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function deleteTestimonial(id) {
            if (!confirm('Are you sure you want to delete this testimonial?')) return;
            let testimonials = JSON.parse(localStorage.getItem('coreTestimonials') || '[]');
            testimonials = testimonials.filter(t => t.id !== id);
            localStorage.setItem('coreTestimonials', JSON.stringify(testimonials));
            loadTestimonials();
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('adminEmail');
            window.location.href = 'login.html';
        }

        loadTestimonials();
    </script>
</body>
</html>
