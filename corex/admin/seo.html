        <main class="flex-1 ml-64 p-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-white">SEO Settings</h1>
                    <p class="text-gray-500 mt-1">Manage meta tags and SEO for your pages</p>
                </div>
                <a href="dashboard.html" class="text-gray-400 hover:text-white transition-colors">← Back to Dashboard</a>
            </div>

            <!-- Global SEO -->
            <div class="card rounded-2xl p-6 mb-6">
                <h3 class="text-xl font-bold text-white mb-4">Global SEO Settings</h3>
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Site Title</label>
                        <input type="text" id="siteTitle" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-white/30 transition-colors" value="CORE | Operating Partner for Holiday Home Businesses">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Site Description</label>
                        <input type="text" id="siteDescription" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-white/30 transition-colors" value="CORE is the operating partner for holiday home operators.">
                    </div>
                </div>
                <div class="mt-6">
                    <button onclick="saveGlobalSEO()" class="bg-white text-black px-6 py-3 rounded-lg font-bold hover:bg-gray-200 transition-colors">Save Global Settings</button>
                </div>
            </div>

            <!-- Page SEO -->
            <div class="card rounded-2xl p-6">
                <h3 class="text-xl font-bold text-white mb-4">Page SEO Settings</h3>
                <div class="space-y-4" id="pageSEOList"></div>
            </div>
        </main>
    </div>

    <script>
        const defaultPageSEO = {
            'index': { title: 'CORE | Operating Partner for Holiday Home Businesses', description: 'CORE is the operating partner for holiday home businesses.' },
            'revenue-management': { title: 'Revenue Management | CORE', description: "CORE's AI-powered revenue management maximizes your property's yield." },
            'operations': { title: 'Operations | CORE', description: "CORE's end-to-end operations management ensures quality." },
            'about': { title: 'About | CORE', description: 'Learn about CORE - the operating partner for holiday home businesses.' },
            'pricing': { title: 'Pricing | CORE', description: 'Transparent pricing for CORE management services.' },
            'contact': { title: 'Contact | CORE', description: 'Get in touch with CORE.' },
            'book-a-call': { title: 'Book a Call | CORE', description: 'Schedule a call with our team.' },
            'blog': { title: 'Blog | CORE', description: 'Insights and tips for holiday home operators.' }
        };

        function loadSEO() {
            const savedSEO = JSON.parse(localStorage.getItem('coreSEO') || '{}');
            const pageSEO = { ...defaultPageSEO, ...savedSEO.pages };
            
            const pageSEOList = document.getElementById('pageSEOList');
            pageSEOList.innerHTML = Object.entries(pageSEO).map(([page, data]) => `
                <div class="p-4 bg-white/5 rounded-xl">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-white font-medium capitalize">${page.replace(/-/g, ' ')}</span>
                        <span class="text-gray-500 text-sm">${page}.html</span>
                    </div>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Meta Title</label>
                            <input type="text" data-page="${page}" data-field="title" class="seo-input w-full bg-black border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-white/30" value="${data.title}">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Meta Description</label>
                            <input type="text" data-page="${page}" data-field="description" class="seo-input w-full bg-black border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-white/30" value="${data.description}">
                        </div>
                    </div>
                </div>
            `).join('');

            if (savedSEO.global) {
                document.getElementById('siteTitle').value = savedSEO.global.siteTitle || '';
                document.getElementById('siteDescription').value = savedSEO.global.siteDescription || '';
            }
        }

        function saveGlobalSEO() {
            const savedSEO = JSON.parse(localStorage.getItem('coreSEO') || '{}');
            savedSEO.global = {
                siteTitle: document.getElementById('siteTitle').value,
                siteDescription: document.getElementById('siteDescription').value
            };
            localStorage.setItem('coreSEO', JSON.stringify(savedSEO));
            alert('Global SEO settings saved!');
        }

        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('seo-input')) {
                const page = e.target.dataset.page;
                const field = e.target.dataset.field;
                const value = e.target.value;
                
                const savedSEO = JSON.parse(localStorage.getItem('coreSEO') || '{}');
                if (!savedSEO.pages) savedSEO.pages = {};
                if (!savedSEO.pages[page]) savedSEO.pages[page] = {};
                savedSEO.pages[page][field] = value;
                localStorage.setItem('coreSEO', JSON.stringify(savedSEO));
            }
        });

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('adminEmail');
            window.location.href = 'login.html';
        }

        loadSEO();
    </script>
</body>
