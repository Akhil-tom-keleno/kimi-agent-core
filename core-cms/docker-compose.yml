services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: core-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      PORT: 5000
      NODE_ENV: production
    expose:
      - "5000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: core-client
    restart: unless-stopped
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${APP_UPSTREAM_PORT:-8080}:80"
    depends_on:
      - server
