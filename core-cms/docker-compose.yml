version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: core-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: core-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/core-cms?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    expose:
      - "5000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: core-client
    restart: unless-stopped
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${APP_UPSTREAM_PORT:-8080}:80"
    depends_on:
      - server

volumes:
  mongodb_data:
